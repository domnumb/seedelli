<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Seedelli — Ton potager sur mesure</title>
<meta name="description" content="Trouve les graines faites pour ton potager. Semences libres, reproductibles, adaptées à ta région. Sélection personnalisée Kokopelli.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap">
<style>
:root{--vert1:#2d5016;--vert2:#4a7c2e;--terre1:#8B6914;--terre2:#D4A843;--accent:#E07A2F;--rose:#e8a0bf}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#FDF8F0;color:#333;min-height:100vh;
background-image:repeating-radial-gradient(circle at 50% 50%,transparent 0,#FDF8F0 1px,transparent 1px,transparent 2px);
padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
-webkit-text-size-adjust:100%}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;color:var(--vert1)}
.screen{display:none;opacity:0;transition:opacity 0.5s ease;max-width:500px;margin:0 auto;padding:1rem;min-height:100vh}
.screen.active{display:block;opacity:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.875rem 1.75rem;border-radius:.75rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-size:1rem;min-height:44px;min-width:44px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-primary{background:var(--vert2);color:#fff}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{background:#fff;color:var(--vert1);border:2px solid var(--vert2)}
.card{background:#fff;border-radius:1rem;padding:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e8dcc8}
.opt{border:2px solid #e8dcc8;border-radius:1rem;padding:1rem;cursor:pointer;text-align:center;background:#fff;transition:all .2s;min-height:44px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.opt.selected{border-color:var(--vert2);background:#e8f5e0;transform:scale(1.03);box-shadow:0 0 0 3px rgba(74,124,46,.15)}
.opt .emoji{font-size:2.5rem;display:block;margin-bottom:.5rem}
.bar-indoor{background:#a78bfa}.bar-outdoor{background:#34d399}.bar-transplant{background:#60a5fa}.bar-harvest{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.6s ease both}
@keyframes seedDrop{0%{transform:translateY(-60px);opacity:0}40%{transform:translateY(0);opacity:1}100%{transform:translateY(0);opacity:1}}
@keyframes sprout{0%{height:0;opacity:0}100%{height:40px;opacity:1}}
@keyframes leaf{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.seed-anim .seed{animation:seedDrop 1.5s ease both;font-size:2rem}
.seed-anim .stem{width:3px;background:var(--vert2);margin:0 auto;animation:sprout 1.5s ease 1.5s both;border-radius:2px}
.seed-anim .leaves{animation:leaf 1s ease 2.5s both;font-size:1.5rem}
.cal-scroll{overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.cal-scroll>*{scroll-snap-align:start}
.back-btn{position:absolute;top:1rem;left:1rem;background:none;border:none;font-size:1.5rem;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;gap:.35rem;-webkit-tap-highlight-color:transparent;color:var(--vert1);z-index:10}
.back-btn .back-label{display:none;font-size:.9rem;font-weight:600}
.nav-dots{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem;z-index:100}
.nav-dots .dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:all .3s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.nav-dots .dot.active{background:var(--vert2);transform:scale(1.3)}
.quick-nav{position:fixed;bottom:2.5rem;right:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:100}
.quick-nav .qn-btn{width:44px;height:44px;border-radius:50%;background:#fff;border:2px solid var(--vert2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);-webkit-tap-highlight-color:transparent}
.quick-nav .qn-btn .qn-label{display:none}
.mini-cal{display:grid;grid-template-columns:repeat(12,1fr);gap:1px;margin:.5rem 0}
.mini-cal .mc{width:100%;aspect-ratio:1;border-radius:2px;background:#f0f0f0;font-size:.5rem;display:flex;align-items:center;justify-content:center}
.variety-card{background:#fff;border-radius:1rem;padding:1rem;margin-bottom:.75rem;border:1px solid #e8dcc8;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.variety-card .vc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.variety-card .vc-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--vert1);font-weight:700}
.variety-card .vc-desc{font-size:.85rem;opacity:.7;margin:.25rem 0}
.variety-card .vc-price{font-weight:700;color:var(--accent);white-space:nowrap}
.remove-btn{background:none;border:none;color:#ccc;font-size:1.2rem;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.remove-btn:active{color:#e55}
.season-group{margin-bottom:1.5rem}
.season-group h3{margin-bottom:.75rem;font-size:1.1rem}
.stars{color:#d4a843;letter-spacing:2px;font-size:.8rem}
.legend{display:flex;flex-wrap:wrap;gap:.75rem;margin:.75rem 0;font-size:.75rem}
.legend span{display:flex;align-items:center;gap:.25rem}
.legend span::before{content:'';width:12px;height:12px;border-radius:2px;display:inline-block}
.legend .l-indoor::before{background:#a78bfa}
.legend .l-outdoor::before{background:#34d399}
.legend .l-transplant::before{background:#60a5fa}
.legend .l-harvest::before{background:#f87171}
.cal-table{width:100%;border-collapse:collapse;font-size:.7rem;min-width:700px;display:none}
.cal-table th,.cal-table td{padding:4px 2px;text-align:center;border:1px solid #e8dcc8}
.cal-table th{background:#f5f0e6;font-weight:600;position:sticky;top:0;z-index:1}
.cal-table .current-month{background:rgba(74,124,46,.08)}
.cal-table .var-name{text-align:left;white-space:nowrap;padding-left:6px;font-weight:600;min-width:140px;position:sticky;left:0;background:#fff;z-index:2}
.cal-table .ci{width:100%;height:16px;border-radius:2px}
/* Mobile calendar cards */
.cal-cards{display:block}
.cal-card{background:#fff;border-radius:1rem;padding:.75rem 1rem;margin-bottom:.75rem;border:1px solid #e8dcc8;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cal-card .cc-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--vert1);font-weight:700}
.cal-card .cc-now{font-size:.8rem;margin:.25rem 0;font-weight:600}
.cal-card .cc-bar{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-top:.5rem}
.cal-card .cc-bar .cb{height:22px;border-radius:3px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#666;font-weight:600}
.cal-card .cc-bar .cb.now{outline:2px solid var(--vert1);outline-offset:-1px}
.summary-stat{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid #f0e8d8}
.summary-stat:last-child{border:none}
.summary-stat .ss-icon{font-size:1.5rem;min-width:40px;text-align:center}
.summary-stat .ss-value{font-size:1.2rem;font-weight:700;color:var(--vert1)}
input[type="text"],input[type="email"]{width:100%;padding:.875rem;border:2px solid #e8dcc8;border-radius:.75rem;font-size:1rem;outline:none;transition:border-color .2s;background:#fff;font-family:inherit}
input[type="text"]:focus,input[type="email"]:focus{border-color:var(--vert2)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-weight:600;margin-bottom:.25rem;font-size:.9rem}
.nav-dots .dot.disabled{opacity:.3;cursor:default;pointer-events:none}
.toast{position:fixed;bottom:4rem;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:.75rem 1.25rem;border-radius:.75rem;font-size:.9rem;z-index:200;animation:fadeUp .4s ease;max-width:90vw;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast button{background:var(--vert2);color:#fff;border:none;padding:.35rem .75rem;border-radius:.5rem;margin-left:.5rem;cursor:pointer;font-weight:600;font-size:.85rem}
.toast .toast-no{background:#666}
.cal-tooltip{position:fixed;background:#333;color:#fff;padding:.5rem .75rem;border-radius:.5rem;font-size:.8rem;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.quick-adjust{display:flex;flex-wrap:wrap;gap:.5rem;margin:.75rem 0}
.quick-adjust button{padding:.4rem .75rem;border-radius:2rem;border:1.5px solid var(--vert2);background:#fff;color:var(--vert1);font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.quick-adjust button:active{background:var(--vert2);color:#fff}
.form-errors{color:#c44;font-size:.85rem;margin-bottom:1rem;padding:.75rem;background:#fef2f2;border-radius:.5rem;display:none}

/* Guided checkout overlay */
.guided-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.guided-panel{background:#FDF8F0;border-radius:1.5rem 1.5rem 0 0;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.guided-progress{height:6px;background:#e8dcc8;border-radius:3px;margin:1rem 0 1.5rem}
.guided-progress-bar{height:100%;background:var(--vert2);border-radius:3px;transition:width .4s ease}
.guided-card{background:#fff;border-radius:1rem;padding:1.25rem;border:1px solid #e8dcc8;margin-bottom:1rem;text-align:center}
.guided-card .gc-name{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--vert1);font-weight:700;margin-bottom:.25rem}
.guided-card .gc-price{font-size:1.5rem;font-weight:700;color:var(--accent);margin:.5rem 0}
.guided-card .gc-cat{font-size:.85rem;opacity:.6;margin-bottom:.75rem}
.guided-next{font-size:.8rem;opacity:.5;margin-top:.75rem;text-align:center}
/* Sticky CTA on screen 5 */
.sticky-cta{position:sticky;bottom:0;background:linear-gradient(transparent,#FDF8F0 30%);padding:1rem 0 .5rem;margin-top:1rem}
/* Progress bar questions */
.q-progress{height:4px;background:#e8dcc8;border-radius:2px;margin-bottom:1.5rem}
.q-progress-fill{height:100%;background:var(--vert2);border-radius:2px;transition:width .3s}
/* GPS button */
.gps-btn{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.875rem;border:2px dashed var(--vert2);border-radius:.75rem;background:#f0f7eb;color:var(--vert1);font-weight:600;cursor:pointer;font-size:1rem;margin-bottom:.75rem;transition:all .2s}
.gps-btn:active{background:#e0f0d0}
/* Trust badges */
.trust-badges{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:.75rem;opacity:.6;font-size:.8rem}
.trust-badges span{display:flex;align-items:center;gap:.25rem}

/* ===== RESPONSIVE DESKTOP ===== */
@media(min-width:768px){
  body{background:#e8e0d4}
  .screen{max-width:700px;min-height:auto;background:#FDF8F0;border-radius:1.5rem;box-shadow:0 8px 40px rgba(0,0,0,.12);padding:2rem 2.5rem;margin:2rem auto}
  /* Narrative screens stay narrow */
  #s1>div,#s2>div,#s4>div{max-width:600px;margin:0 auto}
  #s1 .seed-anim .seed{font-size:3rem}
  #s1 .seed-anim .leaves{font-size:2rem}
  #s2 h1{font-size:2.25rem}
  /* Questions */
  #s3-content{max-width:650px;margin:0 auto}
  .opt{padding:1.5rem}
  .opt .emoji{font-size:3rem}
  /* Variety grid */
  .variety-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .variety-cards-grid .variety-card{margin-bottom:0}
  /* Order form grid */
  .order-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem 1rem}
  .order-form-grid .full-width{grid-column:1/-1}
  /* Nav dots pills */
  .nav-dots{bottom:1.5rem}
  .nav-dots .dot{width:10px;height:10px;border-radius:5px;transition:all .3s}
  .nav-dots .dot.active{width:24px;border-radius:5px}
  /* Quick nav with labels */
  .quick-nav{bottom:3rem;right:2rem}
  .quick-nav .qn-btn{width:auto;border-radius:.75rem;padding:.5rem 1rem;font-size:1rem}
  .quick-nav .qn-btn .qn-label{display:inline;margin-left:.35rem;font-size:.8rem;font-weight:600}
  /* Back button larger */
  .back-btn{font-size:1.2rem;padding:.5rem 1rem;border-radius:.5rem}
  .back-btn .back-label{display:inline;font-size:.9rem}
  /* Sticky header full-width in card */
  #basket-header{margin:0 -2.5rem;padding-left:2.5rem;padding-right:2.5rem;border-radius:1.5rem 1.5rem 0 0}
  /* Calendar: show table, hide cards on tablet+ */
  .cal-table{display:table;min-width:auto}
  .cal-cards{display:none}
}
@media(min-width:1024px){
  body{background:#f0ece4}
  .screen{max-width:900px;padding:3rem;margin-top:2rem;margin-bottom:2rem;min-height:calc(100vh - 4rem)}
  #basket-header{margin:0 -3rem;padding-left:3rem;padding-right:3rem}
  .cal-table{min-width:auto;font-size:.85rem}
  .cal-table th,.cal-table td{padding:6px 4px}
  .cal-table .var-name{min-width:180px}
  .cal-table .ci{height:22px}
  .cal-scroll{overflow-x:visible}
}
@media(min-width:1200px){
  .variety-cards-grid{grid-template-columns:1fr 1fr 1fr}
  #s7-content{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start}
}
@media(min-width:1400px){
  .screen{max-width:1100px}
}
@media(hover:hover){
  .btn-primary:hover{background:var(--vert1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,80,22,.2)}
  .btn-secondary:hover{background:#f0f7eb;border-color:var(--vert1)}
  .opt:hover:not(.selected){border-color:var(--vert2);box-shadow:0 2px 8px rgba(74,124,46,.1)}
  .variety-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px);transition:all .2s}
  .remove-btn:hover{color:#e55}
  .quick-adjust button:hover{background:var(--vert2);color:#fff}
  .quick-nav .qn-btn:hover{background:#f0f7eb;transform:scale(1.05)}
  .back-btn:hover{background:#f0f7eb}
  .nav-dots .dot:hover:not(.disabled){background:var(--vert2);opacity:.6}
}

@media print{
@page{size:A4 landscape;margin:1cm}
.no-print{display:none!important}
body{background:#fff!important;background-image:none!important}
.screen{display:none!important}
.nav-dots,.quick-nav,.back-btn{display:none!important}
#print-calendar{display:block!important;break-inside:avoid}
#print-list{display:block!important;page-break-before:always}
.print-footer{display:block!important;text-align:center;font-family:'Playfair Display',Georgia,serif;margin-top:2rem;font-size:1rem;color:var(--vert1)}
.print-legend{display:flex!important;gap:1.5rem;margin-bottom:.75rem;font-size:.85rem}
.print-legend span{display:flex;align-items:center;gap:.35rem}
.print-legend .pl-box{width:14px;height:14px;border-radius:2px;display:inline-block}
}
</style>
</head>
<body>
<script>
// ========== CATALOG LOADER ==========
let VARIETIES = [];
let SEMENCIER = {
  id: 'kokopelli',
  name: 'Kokopelli',
  tagline: 'Semences libres, reproductibles, bio',
  url: 'https://www.kokopelli-semences.fr',
  color: '#4a7c2e',
  accent: '#E07A2F',
  logo_emoji: '🌱',
  utm: 'utm_source=seedelli&utm_medium=referral&utm_campaign=recommandation'
};

async function loadCatalog() {
  const params = new URLSearchParams(window.location.search);
  const source = params.get('source') || 'kokopelli';
  const base = window.location.pathname.replace(/\/[^/]*$/, '/');
  try {
    const [varieties, meta] = await Promise.all([
      fetch(base + 'catalogs/' + source + '.json').then(r => r.json()),
      fetch(base + 'catalogs/' + source + '-meta.json').then(r => r.json()).catch(() => null)
    ]);
    VARIETIES = varieties;
    if (meta) SEMENCIER = meta;
  } catch(e) {
    if (source !== 'kokopelli') {
      VARIETIES = await fetch(base + 'catalogs/kokopelli.json').then(r => r.json());
    }
  }
}

const ZONES={
mediterraneenne:{deps:["06","11","13","30","34","66","83","84","2A","2B"],lastFrost:"03-15",firstFrost:"11-15",label:"Méditerranéenne"},
atlantique:{deps:["17","29","33","35","40","44","56","64","85"],lastFrost:"04-01",firstFrost:"10-30",label:"Atlantique"},
oceanique:{deps:["14","16","22","27","37","41","49","50","53","72","76","79","86"],lastFrost:"04-15",firstFrost:"10-15",label:"Océanique dégradé"},
semi_continentale:{deps:["01","03","15","18","21","23","25","36","39","42","43","45","46","52","54","55","57","58","63","67","68","69","70","71","73","74","87","88","89","90"],lastFrost:"04-30",firstFrost:"10-01",label:"Semi-continentale"},
montagne:{deps:["04","05","07","09","12","26","31","32","38","48","65","81","82"],lastFrost:"05-15",firstFrost:"09-15",label:"Montagne"},
idf_nord:{deps:["02","08","10","19","20","24","28","47","51","59","60","62","75","77","78","80","91","92","93","94","95"],lastFrost:"04-15",firstFrost:"10-15",label:"Île-de-France / Nord"}
};

// ========== STATE ==========
let state = {
  location: null,
  answers: {},
  basket: [],
  allCompatible: [],
  currentScreen: 1
};

let currentQ = 0;

const questions = [
  {
    id: 'objectifs',
    title: "Qu'est-ce qui te fait r\u00eaver ?",
    multi: true,
    options: [
      { value: 'autonomie', emoji: '\ud83c\udf45', label: 'Manger du jardin' },
      { value: 'originalite', emoji: '\u2728', label: 'Vari\u00e9t\u00e9s rares' },
      { value: 'medicinales', emoji: '\ud83d\udc8a', label: 'Plantes qui soignent' },
      { value: 'pollinisateurs', emoji: '\ud83c\udf38', label: 'Des fleurs partout' },
      { value: 'conserves', emoji: '\ud83e\uded9', label: "Conserves pour l'hiver" },
      { value: 'enfants', emoji: '\ud83d\udc76', label: 'Jardin avec les enfants' }
    ]
  },
  {
    id: 'experience',
    title: 'Ton \u00e9nergie jardin ?',
    multi: false,
    options: [
      { value: 'debutant', emoji: '\ud83c\udf31', label: 'Tranquille', sub: 'je d\u00e9couvre' },
      { value: 'quelques', emoji: '\ud83c\udf3f', label: 'Motiv\u00e9e', sub: "j'apprends" },
      { value: 'expert', emoji: '\ud83c\udf33', label: '\u00c0 fond', sub: 'plantez tout !' }
    ]
  },
  {
    id: 'surface',
    title: "L'espace dehors ?",
    multi: false,
    options: [
      { value: 'petit', emoji: '\ud83c\udf31', label: 'Un petit coin', sub: '5-20 m\u00b2' },
      { value: 'familial', emoji: '\ud83c\udfe1', label: 'Un beau potager', sub: '20-100 m\u00b2' },
      { value: 'grand', emoji: '\ud83c\udf04', label: 'On a de la place !', sub: '100 m\u00b2 et +' }
    ]
  },
  {
    id: 'budget',
    title: 'Et le budget graines ?',
    multi: false,
    options: [
      { value: 'petit', emoji: '\ud83d\udc9a', label: '30-50\u20ac', sub: "L'essentiel pour commencer" },
      { value: 'moyen', emoji: '\ud83d\udc9b', label: '50-100\u20ac', sub: 'Un potager bien garni' },
      { value: 'genereux', emoji: '\ud83e\udde1', label: '100-200\u20ac', sub: 'La totale' },
      { value: 'illimite', emoji: '\u2764\ufe0f', label: 'Pas de limite', sub: 'Collectionneuse !' }
    ]
  }
];

// ========== ZONE LOOKUP ==========
function getZone(dept) {
  for (const [key, zone] of Object.entries(ZONES)) {
    if (zone.deps.includes(dept)) {
      return { key, ...zone };
    }
  }
  return { key: 'montagne', ...ZONES.montagne };
}

// ========== CALENDAR ADJUSTMENT ==========
function adjustMonths(months, zoneKey, altitude, type) {
  if (!months || !months.length) return [];
  const zoneOff = { mediterraneenne:-1, atlantique:0, oceanique:0, semi_continentale:0, montagne:0, idf_nord:0 }[zoneKey] || 0;
  let altOff = 0;
  if (type === 'indoor') {
    altOff = 0; // Sous abri : pas de décalage
  } else if (type === 'outdoor' || type === 'transplant') {
    if (altitude >= 1200) altOff = 2;
    else if (altitude >= 800) altOff = 1;
    else if (altitude >= 600) altOff = 1;
  } else if (type === 'harvest') {
    if (altitude >= 1200) altOff = 1;
    else if (altitude >= 800) altOff = 1;
  }
  const off = zoneOff + altOff;
  return [...new Set(months.map(m => Math.min(12, Math.max(1, m + off))))].sort((a,b) => a-b);
}

// ========== SEASON GROUP ==========
function getSeasonGroup(v) {
  const zoneKey = state.location.zone.key;
  const altitude = state.location.altitude;
  const indoor = adjustMonths(v.sowing_indoor, zoneKey, altitude, 'indoor');
  const outdoor = adjustMonths(v.sowing_outdoor, zoneKey, altitude, 'outdoor');
  if (indoor.some(m => m <= 4)) return 'abri';
  if (outdoor.some(m => m <= 6)) return 'terre';
  return 'ete';
}

// ========== RECOMMENDATION ENGINE ==========
function generateBasket() {
  const loc = state.location;
  const altitude = loc.altitude;
  const zoneKey = loc.zone.key;
  const objectives = state.answers.objectifs || ['autonomie'];
  const experience = state.answers.experience || 'quelques';
  const surface = state.answers.surface || 'familial';
  const budgetKey = state.answers.budget || 'moyen';

  const budgetMap = { petit:{max:50,sachets:15}, moyen:{max:100,sachets:25}, genereux:{max:200,sachets:50}, illimite:{max:9999,sachets:100} };
  const surfaceMap = { petit:20, familial:100, grand:500 };
  const budget = budgetMap[budgetKey] || budgetMap.moyen;
  const maxSurface = surfaceMap[surface] || 100;

  let scored = [];
  VARIETIES.forEach(v => {
    if (v.altitude_max + 150 < altitude) return;
    if (v.category === 'engrais-verts' && surface === 'petit') return;
    if (surface === 'petit' && v.space_m2 > 0.5) return;

    let score = 50;
    if (objectives.includes('autonomie') && (v.tags.includes('productif') || v.category === 'legumes-fruits' || v.category === 'legumes-racines')) score += 20;
    if (objectives.includes('originalite') && (v.tags.includes('original') || v.tags.includes('rare') || v.tags.includes('gout_exceptionnel'))) score += 20;
    if (objectives.includes('medicinales') && v.medicinal) score += 25;
    if (objectives.includes('pollinisateurs') && v.pollinator_friendly) score += 25;
    if (objectives.includes('conserves') && v.tags.includes('conserves')) score += 20;
    if (objectives.includes('enfants') && v.kids_friendly) score += 15;

    if (experience === 'debutant' && v.beginner_friendly) score += 15;
    if (experience === 'debutant' && v.difficulty >= 4) score -= 15;
    if (experience === 'expert' && v.difficulty >= 4) score += 10;

    if (v.heat_preference === 'forte' && zoneKey === 'montagne' && altitude > 800) score -= 10;
    if (zoneKey === 'montagne' && v.cold_tolerance === 'forte') score += 10;
    if (altitude > 600 && v.cold_tolerance === 'faible') score -= 10;
    if (altitude > 1000 && v.cold_tolerance !== 'forte') score -= 20;

    scored.push({ ...v, score });
  });

  scored.sort((a, b) => b.score - a.score);
  state.allCompatible = scored;

  let basket = [];
  let spent = 0, usedSpace = 0, catCount = {};

  function canAdd(v) {
    if (spent + v.price > budget.max && budget.max < 9999) return false;
    if (usedSpace + v.space_m2 > maxSurface) return false;
    const sc = v.subcategory;
    let maxPerSub = surface === 'grand' ? 5 : surface === 'familial' ? 3 : 2;
    if (sc === 'tomates') maxPerSub = Math.min(maxPerSub + 2, 8);
    if ((catCount[sc] || 0) >= maxPerSub) return false;
    return true;
  }
  function doAdd(v) {
    basket.push(v);
    spent += v.price;
    usedSpace += v.space_m2;
    const sc = v.subcategory;
    catCount[sc] = (catCount[sc] || 0) + 1;
  }

  // Pass 1: Ensure at least 1 variety from each compatible category
  const compatCats = [...new Set(scored.map(v => v.category))];
  compatCats.forEach(cat => {
    if (basket.length >= budget.sachets) return;
    const best = scored.find(v => v.category === cat && !basket.some(b => b.id === v.id) && canAdd(v));
    if (best) doAdd(best);
  });

  // Pass 2: Fill by score
  scored.forEach(v => {
    if (basket.length >= budget.sachets) return;
    if (basket.some(b => b.id === v.id)) return;
    if (!canAdd(v)) return;
    doAdd(v);
  });

  state.basket = basket;
}

// ========== NAVIGATION ==========
function canGoTo(n) {
  if (n <= 2) return true;
  if (n === 3 && !state.location) return false;
  if (n >= 4 && (!state.location || !state.answers.objectifs)) return false;
  if (n >= 5 && (!state.basket || !state.basket.length)) return false;
  return true;
}

function goTo(n) {
  if (!canGoTo(n)) return;
  const screens = document.querySelectorAll('.screen');
  screens.forEach(s => { s.classList.remove('active'); });
  const target = document.getElementById('s' + n);
  if (target) {
    target.classList.add('active');
    window.scrollTo(0, 0);
  }
  state.currentScreen = n;
  // Persist current screen for restore
  try {
    const toSave = { location: state.location, answers: state.answers, basket: state.basket, currentScreen: n };
    const json = JSON.stringify(toSave);
    if (json.length < 500000) {
      toSave.allCompatible = state.allCompatible;
      localStorage.setItem('seedelli-session', JSON.stringify(toSave));
    } else {
      localStorage.setItem('seedelli-session', json);
    }
  } catch(e) {}
  updateDots();
  updateQuickNav();

  if (n === 1) animateIntro();
  if (n === 3) renderQuestion();
  if (n === 4) showGrowthAnimation();
  if (n === 5) renderBasket();
  if (n === 6) renderCalendar();
  if (n === 7) renderOrder();
}

function updateDots() {
  const dots = document.querySelectorAll('.nav-dots .dot');
  dots.forEach((d, i) => {
    const n = i + 1;
    d.classList.toggle('active', n === state.currentScreen);
    d.classList.toggle('disabled', !canGoTo(n));
  });
}

function updateQuickNav() {
  const qn = document.getElementById('quick-nav');
  if (state.currentScreen >= 5 && state.basket && state.basket.length > 0) {
    qn.style.display = 'flex';
  } else {
    qn.style.display = 'none';
  }
}

async function geocodeAddress() {
  const q = document.getElementById('address-input').value.trim();
  if (!q) return;
  const resultDiv = document.getElementById('geo-result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<p style="text-align:center;opacity:.6" class="pulse">Recherche en cours...</p>';

  try {
    const res = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q + ', France') + '&format=json&limit=1&addressdetails=1', {
      headers: { 'Accept-Language': 'fr' }
    });
    const data = await res.json();
    if (data.length === 0) { showFallback(); return; }

    const place = data[0];
    const lat = parseFloat(place.lat);
    const lon = parseFloat(place.lon);
    const addr = place.address || {};
    const postcode = addr.postcode || '';
    const dept = postcode.substring(0, 2);
    const commune = addr.village || addr.town || addr.city || addr.hamlet || q;
    const departement = addr.county || addr.state || '';

    let altitude = 900;
    try {
      const elevRes = await fetch('https://api.open-elevation.com/api/v1/lookup?locations=' + lat + ',' + lon);
      const elevData = await elevRes.json();
      if (elevData.results && elevData.results[0]) {
        altitude = Math.round(elevData.results[0].elevation);
      }
    } catch(e) {}

    const zone = getZone(dept);
    state.location = { commune, dept, departement, altitude, lat, lon, zone, postcode };
    localStorage.setItem('seedelli-session', JSON.stringify(state));
    showLocationResult();
  } catch(e) {
    showFallback();
  }
}

      const commune = addr.village || addr.town || addr.city || addr.hamlet || '';

      let altitude = 200;
      try {
        const elevRes = await fetch('https://api.open-elevation.com/api/v1/lookup?locations=' + lat + ',' + lon);

function renderQuestion() {
  const container = document.getElementById('s3-content');
  if (currentQ >= questions.length) {
    goTo(4);
    return;
  }
  const q = questions[currentQ];
  const cols = q.options.length <= 3 ? 'repeat(3, 1fr)' : 'repeat(2, 1fr)';

  let html = '<div class="fade-up" style="text-align:center;padding-top:2rem">';
  const pct = Math.round((currentQ / questions.length) * 100);
  html += '<div class="q-progress"><div class="q-progress-fill" style="width:' + pct + '%"></div></div>';
  html += '<p style="font-size:.8rem;opacity:.4;margin-bottom:.75rem">' + (currentQ + 1) + ' sur ' + questions.length + '</p>';
  html += '<h2 style="font-size:1.5rem;margin-bottom:1.5rem">' + q.title + '</h2>';
  if (q.multi) html += '<p style="font-size:.85rem;opacity:.6;margin-bottom:1rem">Choisis autant que tu veux</p>';
  html += '<div style="display:grid;grid-template-columns:' + cols + ';gap:.75rem">';

  q.options.forEach(opt => {
    const selected = q.multi ? (state.answers[q.id] || []).includes(opt.value) : state.answers[q.id] === opt.value;
    html += '<div class="opt' + (selected ? ' selected' : '') + '" data-qid="' + q.id + '" data-val="' + opt.value + '" data-multi="' + q.multi + '" onclick="selectOption(this)">';
    html += '<span class="emoji">' + opt.emoji + '</span>';
    html += '<span style="font-weight:600;font-size:.95rem">' + opt.label + '</span>';
    if (opt.sub) html += '<br><span style="font-size:.8rem;opacity:.6">' + opt.sub + '</span>';
    html += '</div>';
  });
  html += '</div>';

  if (q.multi) {
    html += '<button class="btn btn-primary" style="margin-top:1.5rem;width:100%" onclick="nextQuestion()">Suivant \u2192</button>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function selectOption(el) {
  const qid = el.dataset.qid;
  const val = el.dataset.val;
  const multi = el.dataset.multi === 'true';

  if (multi) {
    if (!state.answers[qid]) state.answers[qid] = [];
    const idx = state.answers[qid].indexOf(val);
    if (idx >= 0) { state.answers[qid].splice(idx, 1); }
    else { state.answers[qid].push(val); }
    el.classList.toggle('selected');
  } else {
    state.answers[qid] = val;
    el.parentNode.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(() => nextQuestion(), 400);
  }
  localStorage.setItem('seedelli-session', JSON.stringify(state));
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    goTo(4);
  } else {
    renderQuestion();
  }
}

  return SUBCAT_EMOJI[v.subcategory] || CAT_EMOJI[v.category] || '\ud83c\udf31';
}

function renderMiniCal(v) {
  const zk = state.location.zone.key;
  const alt = state.location.altitude;
  const indoor = adjustMonths(v.sowing_indoor, zk, alt, 'indoor');
  const outdoor = adjustMonths(v.sowing_outdoor, zk, alt, 'outdoor');
  const transplant = adjustMonths(v.transplant, zk, alt, 'transplant');
  const harvest = adjustMonths(v.harvest, zk, alt, 'harvest');

  let html = '<div class="mini-cal">';
  for (let m = 1; m <= 12; m++) {
    let bg = '#f0f0f0';
    let action = '';
    if (harvest.includes(m)) { bg = '#f87171'; action = 'Récolte'; }
    if (transplant.includes(m)) { bg = '#60a5fa'; action = 'Repiquage'; }
    if (outdoor.includes(m)) { bg = '#34d399'; action = 'Semis terre'; }
    if (indoor.includes(m)) { bg = '#a78bfa'; action = 'Semis abri'; }
    const tip = action ? ' onclick="showCalTooltip(event,\'' + v.name.replace(/'/g, "\\'") + '\',\'' + action + '\',\'' + MONTH_FULL[m-1] + '\')" style="background:' + bg + ';cursor:pointer"' : ' style="background:' + bg + '"';
    html += '<div class="mc"' + tip + ' title="' + MONTH_FULL[m-1] + '">' + MONTH_NAMES[m-1] + '</div>';
  }
  html += '</div>';
  return html;
}

function showCalTooltip(e, name, action, month) {
  document.querySelectorAll('.cal-tooltip').forEach(t => t.remove());
  const tip = document.createElement('div');
  tip.className = 'cal-tooltip';
  tip.textContent = name + ' — ' + action + ' en ' + month;
  document.body.appendChild(tip);
  const rect = e.target.getBoundingClientRect();
  tip.style.left = Math.min(rect.left, window.innerWidth - tip.offsetWidth - 10) + 'px';
  tip.style.top = (rect.top - tip.offsetHeight - 6) + 'px';
  setTimeout(() => { if (tip.parentNode) tip.remove(); }, 2000);
}

function renderDifficulty(diff) {
  if (!diff) return '';
  const label = diff <= 2 ? 'Facile' : diff <= 3 ? 'Interm\u00e9diaire' : 'Avanc\u00e9';
  const color = diff <= 2 ? 'var(--vert2)' : diff <= 3 ? 'var(--terre1)' : '#c44';
  return '<span style="font-size:.75rem;font-weight:600;color:' + color + ';background:' + color + '18;padding:.15rem .5rem;border-radius:2rem">' + label + '</span>';
}

function resetAll() {
  if (!confirm('Tu vas perdre ta s\u00e9lection actuelle. Continuer ?')) return;
  localStorage.removeItem('seedelli-session');
  state = { location: null, answers: {}, basket: [], allCompatible: [], currentScreen: 1 };
  goTo(1);
}

function removeVariety(id) {
  const removed = state.basket.find(v => v.id === id);
  state.basket = state.basket.filter(v => v.id !== id);
  localStorage.setItem('seedelli-session', JSON.stringify(state));
  // FEATURE 4: Replacement suggestion
  if (removed && state.allCompatible && state.allCompatible.length) {
    const alt = state.allCompatible.find(v => v.subcategory === removed.subcategory && !state.basket.some(b => b.id === v.id) && v.id !== removed.id);
    if (alt) {
      showToast('🔄 ' + removed.name + ' retirée. Remplacer par ' + alt.name + ' ?',
        [{ text: 'Oui', action: () => { state.basket.push(alt); localStorage.setItem('seedelli-session', JSON.stringify(state)); renderBasket(); } },
         { text: 'Non', cls: 'toast-no', action: () => {} }]
      );
    }
  }
  renderBasket();
}

function showToast(msg, buttons) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const div = document.createElement('div');
  div.className = 'toast';
  let html = '<span>' + msg + '</span>';
  if (buttons) {
    buttons.forEach(b => {
      html += '<button class="' + (b.cls || '') + '" data-action="1">' + b.text + '</button>';
    });
  }
  div.innerHTML = html;
  document.body.appendChild(div);
  if (buttons) {
    div.querySelectorAll('button').forEach((btn, i) => {
      btn.addEventListener('click', () => { buttons[i].action(); div.remove(); });
    });
  }
  setTimeout(() => { if (div.parentNode) div.remove(); }, 6000);
}

function addCategory(cat) {
  if (!state.allCompatible) return;
  const candidates = state.allCompatible.filter(v => v.category === cat && !state.basket.some(b => b.id === v.id));
  candidates.sort((a, b) => b.score - a.score);
  const toAdd = candidates.slice(0, 3);
  if (!toAdd.length) { showToast('Pas de variétés ' + cat + ' supplémentaires disponibles'); return; }
  toAdd.forEach(v => state.basket.push(v));
  localStorage.setItem('seedelli-session', JSON.stringify(state));
  renderBasket();
  showToast(toAdd.length + ' variété(s) ajoutée(s) ✅');
}

function adjustBudget(dir) {
  if (!state.allCompatible) return;
  if (dir > 0) {
    const candidates = state.allCompatible.filter(v => !state.basket.some(b => b.id === v.id));
    candidates.sort((a, b) => b.score - a.score);
    const toAdd = candidates.slice(0, 3);
    if (!toAdd.length) { showToast('Toutes les variétés compatibles sont déjà dans ton panier !'); return; }
    toAdd.forEach(v => state.basket.push(v));
    showToast(toAdd.length + ' variété(s) ajoutée(s) ✅');
  } else {
    if (state.basket.length <= 3) { showToast('Minimum 3 variétés !'); return; }
    state.basket.sort((a, b) => a.score - b.score);
    state.basket.splice(0, Math.min(3, state.basket.length - 3));
    showToast('3 variété(s) retirée(s)');
  }
  localStorage.setItem('seedelli-session', JSON.stringify(state));
  renderBasket();
}

  if (total >= 26) return 6.50;

}

  html += '<div style="font-size:2.5rem;margin-bottom:.5rem">\ud83c\udf3f</div>';
  html += '<h2 style="font-size:1.5rem">Ton potager est pr\u00eat</h2>';
  html += '<p style="opacity:.6;font-size:.9rem;margin-top:.5rem">' + nbVar + ' vari\u00e9t\u00e9s s\u00e9lectionn\u00e9es pour toi</p>';
  html += '</div>';

  // Stats
  html += '<div class="card" style="margin-bottom:1.5rem">';
  html += '<div class="summary-stat"><div class="ss-icon">\ud83c\udf31</div><div><div class="ss-value">' + nbVar + ' vari\u00e9t\u00e9s</div><div style="font-size:.85rem;opacity:.6">Semences libres et reproductibles</div></div></div>';
  html += '<div class="summary-stat"><div class="ss-icon">\ud83d\udcb0</div><div><div class="ss-value">' + grandTotal.toFixed(2) + '\u20ac</div><div style="font-size:.85rem;opacity:.6">' + total.toFixed(2) + '\u20ac graines + ' + (shipping === 0 ? 'livraison offerte' : shipping.toFixed(2) + '\u20ac livraison') + '</div></div></div>';
  if (harvestMonths.size > 0) {
    html += '<div class="summary-stat"><div class="ss-icon">\ud83d\udcc5</div><div><div class="ss-value">' + harvestMonths.size + ' mois de r\u00e9coltes</div><div style="font-size:.85rem;opacity:.6">De ' + MONTH_FULL[Math.min(...harvestMonths)-1] + ' \u00e0 ' + MONTH_FULL[Math.max(...harvestMonths)-1] + '</div></div></div>';
  }
  html += '</div>';

  // Liste des variétés avec liens directs
  html += '<div class="card" style="margin-bottom:1.25rem">';
  html += '<p style="font-weight:700;font-size:.95rem;margin-bottom:.75rem">Tes graines :</p>';
  state.basket.forEach(function(v) {
    const _purl = v[SEMENCIER.url_field || 'kokopelli_url'] || v.kokopelli_url || v.product_url;
    const url = _purl ? _purl + '?' + SEMENCIER.utm : SEMENCIER.url + '?' + SEMENCIER.utm;
    const emoji = getVarietyEmoji(v);
    html += '<a href="' + url + '" target="_blank" rel="noopener" style="display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid #f5ede0;text-decoration:none;color:inherit">';
    html += '<span style="font-size:.95rem">' + emoji + ' ' + v.name + '</span>';
    html += '<span style="font-size:.9rem;font-weight:600;color:var(--terre1);white-space:nowrap;margin-left:.5rem">' + v.price.toFixed(2) + '\u20ac \u2197</span>';
    html += '</a>';
  });
  html += '</div>';

  // Actions secondaires
  html += '<div style="display:flex;gap:.75rem;margin-bottom:.75rem">';
  html += '<button class="btn btn-secondary" style="flex:1" onclick="copyAndGoKokopelli()">\ud83d\udccb Copier la liste</button>';
  html += '<button class="btn btn-secondary" style="flex:1" onclick="printCalendar()">\ud83d\udda8\ufe0f Imprimer</button>';
  html += '</div>';

  html += '<button class="btn btn-secondary" style="width:100%;" onclick="goTo(5)">\u2190 Modifier mes graines</button>';

  container.innerHTML = html;
}

function copyAndGoKokopelli() {
  const lines = ['Mes graines ' + SEMENCIER.name + ' — Seedelli', ''];
  state.basket.forEach(v => lines.push('• ' + v.name + ' \u2014 ' + v.price.toFixed(2) + '\u20ac'));
  const total = state.basket.reduce((s, v) => s + v.price, 0);
  const shipping = getShipping(total);
  lines.push('');
  lines.push('Total : ' + (total + shipping).toFixed(2) + '\u20ac (' + (shipping === 0 ? 'livraison offerte' : '+' + shipping.toFixed(2) + '\u20ac livraison') + ')');
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    showToast('\ud83d\udccb Liste copiée dans le presse-papier !');
  }).catch(() => {});
}

// ========== RESTORE & INIT ==========
function restoreState() {
  const saved = localStorage.getItem('seedelli-session');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed.location) state.location = parsed.location;
      if (parsed.answers) state.answers = parsed.answers;
      if (parsed.basket && parsed.basket.length) state.basket = parsed.basket;
      if (parsed.allCompatible) state.allCompatible = parsed.allCompatible;
      if (state.location && state.answers.objectifs) {
        if (!state.allCompatible || !state.allCompatible.length) generateBasket();
        const resumeScreen = parsed.currentScreen || 5;
        goTo(Math.min(resumeScreen, 7)); // Max screen 7 (selection)
        return true;
      }
    } catch(e) {}
  }
  return false;
}

function applyBranding() {
  // Update CSS vars if semencier has custom colors
  if (SEMENCIER.color) {
    document.documentElement.style.setProperty('--vert2', SEMENCIER.color);
  }
  if (SEMENCIER.accent) {
    document.documentElement.style.setProperty('--accent', SEMENCIER.accent);
  }
  // Update page title
  document.title = 'Seedelli \u00d7 ' + SEMENCIER.name + ' \u2014 Ton potager sur mesure';
  // Update screen 1 badge
  const badge = document.getElementById('s1-semencier');
  if (badge) badge.textContent = SEMENCIER.logo_emoji + ' ' + SEMENCIER.name;
}

document.addEventListener('DOMContentLoaded', async function() {
  await loadCatalog();
  applyBranding();
  if (!restoreState()) {
    goTo(1);
  }
});
</script>
